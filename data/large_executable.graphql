}

query GetCustomer($customerAccessToken: String!) {
  customer(customerAccessToken: $customerAccessToken) {
    id
    firstName
    lastName
    email
    phone
    acceptsMarketing
    createdAt
    updatedAt
    tags
    defaultAddress {
      id
      firstName
      lastName
      company
      address1
      address2
      city
      province
      provinceCode
      country
      countryCodeV2
      zip
      phone
      formatted
    }
    addresses(first: 10) {
      edges {
        node {
          id
          firstName
          lastName
          company
          address1
          address2
          city
          province
          provinceCode
          country
          countryCodeV2
          zip
          phone
          formatted
        }
      }
    }
    orders(first: 20, sortKey: PROCESSED_AT, reverse: true) {
      edges {
        node {
          id
          name
          orderNumber
          processedAt
          financialStatus
          fulfillmentStatus
          currentTotalPrice {
            amount
            currencyCode
          }
          currentSubtotalPrice {
            amount
            currencyCode
          }
          currentTotalTax {
            amount
            currencyCode
          }
          totalShippingPrice {
            amount
            currencyCode
          }
          lineItems(first: 50) {
            edges {
              node {
                title
                quantity
                originalTotalPrice {
                  amount
                  currencyCode
                }
                discountedTotalPrice {
                  amount
                  currencyCode
                }
                variant {
                  id
                  title
                  sku
                  price
                  image {
                    url
                    altText
                    width
                    height
                  }
                  selectedOptions {
                    name
                    value
                  }
                  product {
                    id
                    handle
                  }
                }
              }
            }
          }
          shippingAddress {
            firstName
            lastName
            address1
            address2
            city
            province
            country
            zip
          }
          discountApplications(first: 5) {
            edges {
              node {
                ... on DiscountCodeApplication {
                  code
                  applicable
                  value {
                    ... on MoneyV2 {
                      amount
                      currencyCode
                    }
                    ... on PricingPercentageValue {
                      percentage
                    }
                  }
                }
              }
            }
          }
        }
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
  }
}

query SearchProducts($query: String!, $first: Int!, $after: String, $productFilters: [ProductFilter!], $sortKey: SearchSortKeys, $reverse: Boolean) {
  search(query: $query, first: $first, after: $after, productFilters: $productFilters, sortKey: $sortKey, reverse: $reverse, types: [PRODUCT]) {
    edges {
      cursor
      node {
        ... on Product {
          id
          title
          handle
          vendor
          productType
          tags
          availableForSale
          priceRange {
            minVariantPrice {
              amount
              currencyCode
            }
            maxVariantPrice {
              amount
              currencyCode
            }
          }
          images(first: 1) {
            edges {
              node {
                id
                url
                altText
                width
                height
              }
            }
          }
          variants(first: 3) {
            edges {
              node {
                id
                title
                price
                compareAtPrice
                availableForSale
                selectedOptions {
                  name
                  value
                }
              }
            }
          }
        }
      }
    }
    totalCount
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}

fragment MoneyFields on MoneyV2 {
  amount
  currencyCode
}

fragment ImageFields on Image {
  id
  url
  altText
  width
  height
}

fragment AddressFields on MailingAddress {
  id
  firstName
  lastName
  company
  address1
  address2
  city
  province
  provinceCode
  country
  countryCodeV2
  zip
  phone
  formatted
}

fragment VariantFields on ProductVariant {
  id
  title
  sku
  barcode
  price
  compareAtPrice
  availableForSale
  inventoryQuantity
  weight
  weightUnit
  selectedOptions {
    name
    value
  }
  image {
    ...ImageFields
  }
}

fragment ProductCardFields on Product {
  id
  title
  handle
  vendor
  productType
  tags
  availableForSale
  priceRange {
    minVariantPrice {
      ...MoneyFields
    }
    maxVariantPrice {
      ...MoneyFields
    }
  }
  compareAtPriceRange {
    minVariantPrice {
      ...MoneyFields
    }
    maxVariantPrice {
      ...MoneyFields
    }
  }
  images(first: 1) {
    edges {
      node {
        ...ImageFields
      }
    }
  }
  variants(first: 3) {
    edges {
      node {
        id
        title
        price
        compareAtPrice
        availableForSale
        selectedOptions {
          name
          value
        }
      }
    }
  }
}
